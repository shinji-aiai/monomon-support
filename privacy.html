<h1>プライバシーポリシー</h1>

<p>Monomon（以下「本アプリ」）は、ユーザーのプライバシーを尊重し、個人情報の適切な取り扱いに努めます。</p>

<h2>取得する情報</h2>

<ul>
<li>カメラ（モノモンを発見するため）</li>
<li>写真ライブラリ（保存・共有時のみ）</li>
</ul>

<p>本アプリは、ユーザーの氏名、住所、電話番号などの個人情報を収集しません。</p>

<h2>情報の利用目的</h2>

<p>取得した情報は、アプリの機能提供および品質改善のために利用します。</p>

<h2>第三者提供</h2>

<p>取得した情報を第三者へ販売・提供することはありません。</p>
